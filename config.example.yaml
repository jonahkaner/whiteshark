# Quicksand Trading Bot Configuration
# Copy to config.yaml and fill in your values

mode: paper  # paper | live

# ── Kalshi (US-Legal Prediction Market) ────────────────────────────────
# This is the primary strategy. Create an account at kalshi.com
kalshi:
  api_key: ${KALSHI_API_KEY}
  private_key_path: ""           # Path to RSA private key (for production)
  demo: true                     # true = demo account (play money), false = real

# ── Kalshi Market Making Strategy ──────────────────────────────────────
strategies:
  kalshi_mm:
    enabled: true
    min_spread_cents: 3          # Only make markets with 3¢+ spread
    quote_spread_cents: 2        # Our quotes are 2¢ wide inside the spread
    max_position_per_market: 200 # Max 200 contracts per market
    max_total_exposure: 5000     # Max $5,000 deployed at once
    max_markets: 20              # Make up to 20 markets simultaneously
    min_volume: 50               # Skip illiquid markets
    requote_interval_seconds: 30 # Re-check every 30 seconds

  # ── Crypto Funding Arb (Optional, non-US exchanges) ──────────────────
  funding_arb:
    enabled: false               # Disabled by default (needs non-US exchange)
    min_annualized_rate: 0.12
    kelly_sizing: true
    kelly_fraction: 0.5
    max_position_pct: 0.35
    pairs:
      - BTC/USDT
      - ETH/USDT
      - SOL/USDT

  market_maker:
    enabled: false

# ── Crypto Exchanges (Optional, for funding arb) ──────────────────────
exchanges: {}
  # binance:
  #   api_key: ${BINANCE_API_KEY}
  #   secret: ${BINANCE_SECRET}
  #   sandbox: true

# ── Risk Management ───────────────────────────────────────────────────
risk:
  max_position_pct: 0.20
  max_leverage: 1.0              # No leverage on Kalshi
  daily_loss_limit_pct: 0.02     # Stop trading at 2% daily loss
  max_drawdown_pct: 0.10         # Stop at 10% drawdown from peak
  max_open_positions: 50         # Can have many small prediction market positions

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level: INFO
  file: logs/quicksand.log

# ── Alerts ─────────────────────────────────────────────────────────────
alerts:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
